<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CFD Admin - Painel de Controle</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: white; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .tab-active { @apply bg-blue-600 text-white shadow-lg; }
        .tab-inactive { @apply hover:bg-white/5 text-gray-400; }
        .rounded-corp { border-radius: 4px; }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8">

    <div class="max-w-6xl mx-auto">
        <header class="flex justify-between items-center mb-10">
            <div>
                <h1 class="text-4xl font-black tracking-tight">Painel Administrativo</h1>
                <p class="text-gray-400 font-medium">Customer Facing Display - Configurações Gerais</p>
            </div>
            <a href="javascript:void(0)" onclick="openOrRefreshDisplay()" class="bg-blue-600 hover:bg-blue-500 px-6 py-3 rounded-corp font-bold transition-all flex items-center gap-2">
                VER DISPLAY
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 v-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14" />
                </svg>
            </a>
        </header>

        <nav class="flex gap-2 mb-8 overflow-x-auto flex-wrap">
            <button onclick="switchTab('db')" id="btn-db" class="px-6 py-3 rounded-corp font-bold transition-all tab-active whitespace-nowrap">BANCO DE DADOS</button>
            <button onclick="switchTab('images')" id="btn-images" class="px-6 py-3 rounded-corp font-bold transition-all tab-inactive whitespace-nowrap">IMAGENS (LOGO/PROMO)</button>
            <button onclick="switchTab('colors')" id="btn-colors" class="px-6 py-3 rounded-corp font-bold transition-all tab-inactive whitespace-nowrap">IDENTIDADE VISUAL</button>
            <button onclick="switchTab('avaliacoes')" id="btn-avaliacoes" class="px-6 py-3 rounded-corp font-bold transition-all tab-inactive whitespace-nowrap">AVALIAÇÕES</button>
        </nav>

        <main class="glass rounded-corp p-8 md:p-12 relative min-h-[600px]">
                
                <section id="tab-db">
                    <h2 class="text-3xl font-black mb-6">Configuração Geral</h2>
                    <form id="db-form" class="space-y-6">
                        <div class="space-y-2">
                            <label class="text-xs font-black uppercase text-gray-500">Nome da Empresa (Exibido no CFD)</label>
                            <input type="text" name="store_name" class="w-full bg-black/40 border border-white/10 p-4 rounded-corp outline-none focus:border-blue-500 text-xl font-bold">
                        </div>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div class="space-y-2">
                                <label class="text-xs font-black uppercase text-gray-500">Servidor (Host)</label>
                                <input type="text" name="host" class="w-full bg-black/40 border border-white/10 p-4 rounded-corp outline-none focus:border-blue-500">
                            </div>
                            <div class="space-y-2">
                                <label class="text-xs font-black uppercase text-gray-500">Porta</label>
                                <input type="number" name="port" class="w-full bg-black/40 border border-white/10 p-4 rounded-corp outline-none focus:border-blue-500">
                            </div>
                        </div>
                        <div class="space-y-2">
                            <label class="text-xs font-black uppercase text-gray-500">Caminho do Banco (.fdb)</label>
                            <input type="text" name="database" class="w-full bg-black/40 border border-white/10 p-4 rounded-corp outline-none focus:border-blue-500">
                        </div>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div class="space-y-2">
                                <label class="text-xs font-black uppercase text-gray-500">Usuário</label>
                                <input type="text" name="user" class="w-full bg-black/40 border border-white/10 p-4 rounded-corp outline-none focus:border-blue-500">
                            </div>
                            <div class="space-y-2">
                                <label class="text-xs font-black uppercase text-gray-500">Senha</label>
                                <input type="password" name="password" class="w-full bg-black/40 border border-white/10 p-4 rounded-corp outline-none focus:border-blue-500">
                            </div>
                        </div>
                        <button type="submit" class="bg-blue-600 hover:bg-blue-500 px-10 py-4 rounded-corp font-black">SALVAR CONFIGURAÇÕES</button>
                    </form>
                </section>

                <section id="tab-images" class="hidden">
                    <h2 class="text-3xl font-black mb-10">Logo e Promoções</h2>
                    <div class="p-8 border border-white/10 bg-white/5 rounded-corp mb-10">
                        <h3 class="text-xl font-bold mb-4">Logo do Estabelecimento</h3>
                        <div class="flex items-center gap-8">
                            <div class="w-40 h-40 bg-black rounded-corp border border-white/10 flex items-center justify-center p-2">
                                <img id="logo-preview" src="/logo.png" class="max-w-full max-h-full object-contain" onerror="this.src='https://via.placeholder.com/300?text=LOGO'">
                            </div>
                            <label class="bg-white text-black px-6 py-3 rounded-corp font-bold cursor-pointer transition-all hover:bg-gray-200">
                                ALTERAR LOGO
                                <input type="file" class="hidden" accept="image/*" onchange="prepareCrop(this, 'logo')">
                            </label>
                        </div>
                    </div>
                    <div>
                        <div class="flex justify-between items-center mb-6">
                            <h3 class="text-xl font-bold">Promoções</h3>
                            <label class="bg-blue-600 px-6 py-3 rounded-corp font-bold cursor-pointer">
                                ADICIONAR FOTO
                                <input type="file" class="hidden" accept="image/*" onchange="prepareCrop(this, 'promo')">
                            </label>
                        </div>
                        <div id="promo-list" class="grid grid-cols-3 gap-4"></div>
                    </div>
                </section>

                <section id="tab-colors" class="hidden">
                    <h2 class="text-3xl font-black mb-6">Cores do Template</h2>
                    <form id="colors-form" class="space-y-8">
                        <div class="grid grid-cols-2 gap-8">
                            <div class="space-y-2">
                                <label class="text-xs font-black text-gray-500">BG LISTAGEM (ESQUERDA)</label>
                                <input type="color" name="bg_list" class="w-full h-16 bg-transparent cursor-pointer">
                            </div>
                            <div class="space-y-2">
                                <label class="text-xs font-black text-gray-500">BG LATERAL (DIREITA)</label>
                                <input type="color" name="bg_side" class="w-full h-16 bg-transparent cursor-pointer">
                            </div>
                            <div class="space-y-2">
                                <label class="text-xs font-black text-gray-500">COR PRIMÁRIA (BG Totais)</label>
                                <input type="color" name="primary" class="w-full h-16 bg-transparent cursor-pointer">
                            </div>
                            <div class="space-y-2">
                                <label class="text-xs font-black text-gray-500">COR SECUNDÁRIA (Cabeçalho Tabela)</label>
                                <input type="color" name="secondary" class="w-full h-16 bg-transparent cursor-pointer">
                            </div>
                            <div class="space-y-2">
                                <label class="text-xs font-black text-gray-500">COR ACENTO (Bordas/Overlay)</label>
                                <input type="color" name="accent" class="w-full h-16 bg-transparent cursor-pointer">
                            </div>
                            <div class="space-y-2">
                                <label class="text-xs font-black text-gray-500">COR TEXTO GERAL</label>
                                <input type="color" name="text" class="w-full h-16 bg-transparent cursor-pointer">
                            </div>
                            <div class="space-y-2">
                                <label class="text-xs font-black text-gray-500">TEXTO DO TOTAL (R$)</label>
                                <input type="color" name="text_total" class="w-full h-16 bg-transparent cursor-pointer">
                            </div>
                        </div>
                        <button type="submit" class="bg-blue-600 px-10 py-4 rounded-corp font-black">SALVAR CORES</button>
                    </form>
                </section>

                <section id="tab-avaliacoes" class="hidden">
                    <h2 class="text-3xl font-black mb-8">Sistema de Avaliações</h2>
                    
                    <div class="p-6 border border-white/10 bg-white/5 rounded-corp mb-8">
                        <h3 class="text-xl font-bold mb-6">Configuração</h3>
                        <form id="avaliacao-config-form" class="space-y-6">
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                                <div class="space-y-2">
                                    <label class="text-xs font-black uppercase text-gray-500">Status</label>
                                    <select id="config-ativa" class="w-full bg-black/40 border border-white/10 p-4 rounded-corp outline-none focus:border-blue-500">
                                        <option value="false">Desativada</option>
                                        <option value="true">Ativada</option>
                                    </select>
                                </div>
                                <div class="space-y-2">
                                    <label class="text-xs font-black uppercase text-gray-500">Tipo de Avaliação</label>
                                    <select id="config-tipo" class="w-full bg-black/40 border border-white/10 p-4 rounded-corp outline-none focus:border-blue-500">
                                        <option value="ESTRELA">Estrelas (1-5)</option>
                                        <option value="QRCODE">QR Code</option>
                                    </select>
                                </div>
                            </div>
                            <div id="url-qr-container" class="space-y-2 hidden">
                                <label class="text-xs font-black uppercase text-gray-500">URL para QR Code</label>
                                <input type="url" id="config-url-qr" class="w-full bg-black/40 border border-white/10 p-4 rounded-corp outline-none focus:border-blue-500" placeholder="https://seusite.com/avaliar">
                                <div class="flex gap-4 items-end">
                                    <div id="qr-preview" class="mt-4 p-4 bg-white rounded-corp w-32 h-32 flex items-center justify-center"></div>
                                    <button type="button" onclick="openQRModal()" class="bg-purple-600 hover:bg-purple-500 px-6 py-3 rounded-corp font-bold whitespace-nowrap">VER QR</button>
                                </div>
                            </div>
                            <button type="submit" class="bg-blue-600 hover:bg-blue-500 px-10 py-4 rounded-corp font-black">SALVAR CONFIGURAÇÃO</button>
                        </form>
                    </div>

                    <div class="p-6 border border-white/10 bg-white/5 rounded-corp">
                        <h3 class="text-xl font-bold mb-6">Avaliações Realizadas</h3>
                        <div class="flex gap-4 mb-6 flex-wrap">
                            <input type="date" id="filter-data-inicio" class="bg-black/40 border border-white/10 p-3 rounded-corp outline-none focus:border-blue-500" placeholder="Data inicial">
                            <input type="date" id="filter-data-fim" class="bg-black/40 border border-white/10 p-3 rounded-corp outline-none focus:border-blue-500" placeholder="Data final">
                            <input type="number" id="filter-operador" class="bg-black/40 border border-white/10 p-3 rounded-corp outline-none focus:border-blue-500" placeholder="ID Operador">
                            <button onclick="loadAvaliacoes()" class="bg-green-600 hover:bg-green-500 px-6 py-3 rounded-corp font-bold">FILTRAR</button>
                            <button onclick="exportAvaliacoesCSV()" class="bg-cyan-600 hover:bg-cyan-500 px-6 py-3 rounded-corp font-bold">EXPORTAR CSV</button>
                        </div>
                        <div id="avaliacoes-list" class="space-y-2 max-h-96 overflow-y-auto">
                            <p class="text-gray-500">Carregando...</p>
                        </div>
                    </div>
                </section>
            </main>
        </div>
    </div>

    <div id="qr-modal" class="fixed inset-0 bg-black/95 z-50 hidden flex flex-col items-center justify-center p-4">
        <div class="w-full max-w-2xl bg-[#1e293b] rounded-corp overflow-hidden">
            <div class="p-6 border-b border-white/5 flex justify-between items-center">
                <h3 class="text-xl font-black">QR Code para Avaliação</h3>
                <button onclick="closeQRModal()" class="text-gray-400 hover:text-white font-bold">FECHAR</button>
            </div>
            <div class="p-8 flex justify-center">
                <div id="qr-modal-display" class="bg-white p-8 rounded-corp"></div>
            </div>
        </div>
    </div>

    <div id="cropper-modal" class="fixed inset-0 bg-black/95 z-50 hidden flex flex-col items-center justify-center p-4">
        <div class="w-full max-w-4xl bg-[#1e293b] rounded-corp overflow-hidden">
            <div class="p-6 border-b border-white/5 flex justify-between items-center">
                <h3 class="text-xl font-black">Recortar Imagem</h3>
                <button onclick="closeCropper()" class="text-gray-400">FECHAR</button>
            </div>
            <div class="p-8">
                <div class="max-h-[500px] overflow-hidden rounded-corp bg-black mb-6">
                    <img id="cropper-img" src="" class="max-w-full">
                </div>
                <div class="flex justify-end gap-4">
                    <button id="save-crop-btn" class="bg-blue-600 px-10 py-4 rounded-corp font-black text-xl">ENVIAR IMAGEM</button>
                </div>
            </div>
        </div>
    </div>

    <script src="js/admin-app.js"></script>
</body>
</html>
